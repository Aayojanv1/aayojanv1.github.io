<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4380D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="plateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0F0F0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#grad1)" />
  <circle cx="200" cy="200" r="175" fill="#FDF8F3" />
  
  <!-- Decorative Bengali alpona pattern (simplified) -->
  <circle cx="200" cy="200" r="165" fill="none" stroke="#FF6B35" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.4"/>
  <circle cx="200" cy="200" r="155" fill="none" stroke="#D4380D" stroke-width="1" stroke-dasharray="4,8" opacity="0.3"/>
  
  <!-- Serving plate/cloche -->
  <ellipse cx="200" cy="260" rx="95" ry="25" fill="#E8E8E8" opacity="0.5"/>
  <ellipse cx="200" cy="250" rx="90" ry="22" fill="url(#plateGrad)" stroke="#DDD" stroke-width="1.5"/>
  
  <!-- Cloche dome -->
  <path d="M 120 250 Q 120 160 200 140 Q 280 160 280 250" fill="url(#grad2)" opacity="0.9"/>
  <path d="M 120 250 Q 120 165 200 145 Q 280 165 280 250" fill="none" stroke="#D4380D" stroke-width="2"/>
  
  <!-- Cloche handle -->
  <ellipse cx="200" cy="135" rx="15" ry="10" fill="#D4380D"/>
  <ellipse cx="200" cy="133" rx="10" ry="7" fill="#FF6B35"/>
  
  <!-- Steam lines (representing hot food) -->
  <path d="M 175 120 Q 172 105 178 90" fill="none" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 200 115 Q 197 97 203 80" fill="none" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 225 120 Q 222 105 228 90" fill="none" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  
  <!-- AI sparkle dots -->
  <circle cx="155" cy="100" r="3" fill="#FFD700" opacity="0.8"/>
  <circle cx="245" cy="95" r="2.5" fill="#FFD700" opacity="0.8"/>
  <circle cx="160" cy="85" r="2" fill="#FFD700" opacity="0.6"/>
  <circle cx="240" cy="82" r="2" fill="#FFD700" opacity="0.6"/>
  
  <!-- Brand text: AAYOJAN -->
  <text x="200" y="310" font-family="Georgia, serif" font-size="38" font-weight="bold" fill="#D4380D" text-anchor="middle" letter-spacing="3">AAYOJAN</text>
  
  <!-- Tagline -->
  <text x="200" y="340" font-family="Arial, sans-serif" font-size="13" fill="#666" text-anchor="middle" letter-spacing="1.5">CATERING • ELEVATED</text>
  
  <!-- Bengali accent -->
  <text x="200" y="365" font-family="sans-serif" font-size="11" fill="#FF6B35" text-anchor="middle" opacity="0.8">আয়োজন</text>
</svg>

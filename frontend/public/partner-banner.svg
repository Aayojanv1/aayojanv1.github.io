<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="50%" style="stop-color:#D4380D"/>
      <stop offset="100%" style="stop-color:#8B1A00"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE68A"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1100" cy="530" r="250" fill="rgba(255,255,255,0.03)"/>
  <circle cx="900" cy="100" r="150" fill="rgba(255,255,255,0.02)"/>
  
  <!-- Handshake emoji area -->
  <text x="600" y="140" text-anchor="middle" font-size="80">🤝</text>
  
  <!-- Main heading -->
  <text x="600" y="220" text-anchor="middle" font-family="Georgia, serif" font-size="56" font-weight="bold" fill="#FFFFFF">Partner with Aayojan</text>
  
  <!-- Subheading -->
  <text x="600" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.9)">Newtown Kolkata's ONLY Catering Aggregator</text>
  
  <!-- Offer box -->
  <rect x="200" y="310" width="800" height="180" rx="16" fill="rgba(255,255,255,0.95)"/>
  <rect x="200" y="310" width="800" height="180" rx="16" fill="none" stroke="url(#gold)" stroke-width="3"/>
  
  <!-- Launch offer badge -->
  <rect x="460" y="295" width="280" height="32" rx="16" fill="#F59E0B"/>
  <text x="600" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">🔥 LAUNCH OFFER — LIMITED SLOTS</text>
  
  <!-- Offer content -->
  <text x="600" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#92400E">First 10 Partners — FREE Forever</text>
  
  <!-- Three pillars -->
  <text x="350" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#16A34A">₹0</text>
  <text x="350" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666666">Onboarding Fee</text>
  
  <text x="600" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#16A34A">₹0</text>
  <text x="600" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666666">Listing Fee</text>
  
  <text x="850" y="420" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#16A34A">3%</text>
  <text x="850" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666666">Only When You Earn</text>
  
  <!-- Revenue math -->
  <text x="600" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#92400E">💰 2 extra orders/month = ₹80,000+ additional revenue</text>
  
  <!-- Bottom CTA -->
  <rect x="380" y="530" width="440" height="56" rx="28" fill="#25D366"/>
  <text x="600" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">📱 WhatsApp: 8088434425</text>
  
  <!-- Website -->
  <text x="600" y="615" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.8)">🌐 aayojan.online/#partner-terms</text>
</svg>

name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ─── Build React Frontend ───────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.API_URL }}
        run: npm run build

      # ─── Build Flutter App ──────────────────────────────────────
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'

      - name: Build Flutter web
        working-directory: app
        run: |
          flutter pub get
          flutter build web --base-href "/aayojan/app/" --release --dart-define=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      # ─── Combine outputs ────────────────────────────────────────
      - name: Combine builds
        run: |
          mkdir -p _site
          cp -r frontend/dist/* _site/
          mkdir -p _site/app
          cp -r app/build/web/* _site/app/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
